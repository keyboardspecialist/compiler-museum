<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compiler Museum</title>
<style>
  :root {
    --bg:#11151a; --panel:#171c23; --panel2:#1d242d; --fg:#d6dde6; --dim:#8a97a6;
    --accent:#6cb6ff; --ok:#79c879; --err:#ff6b6b; --border:#28313c; --kw:#c792ea;
  }
  [data-theme="light"] {
    --bg:#f4f6f8; --panel:#fff; --panel2:#eef1f5; --fg:#1a2330; --dim:#5a6b7b;
    --accent:#0b67c2; --ok:#176c17; --err:#b00020; --border:#d4dbe3; --kw:#7a3fb0;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,-apple-system,Segoe UI,sans-serif;
         background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
  header { display:flex; gap:10px; align-items:center; padding:10px 14px;
           background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0 8px 0 0; font-weight:650; letter-spacing:.2px; }
  header h1 .y { color:var(--accent); }
  select, button { font:inherit; background:var(--panel2); color:var(--fg);
           border:1px solid var(--border); border-radius:6px; padding:5px 9px; cursor:pointer; }
  button.run { background:var(--accent); color:#04121f; border-color:var(--accent); font-weight:650; }
  button.run:hover { filter:brightness(1.08); }
  .spacer { flex:1; }
  main { flex:1; display:grid; grid-template-columns: 1fr 1fr; gap:1px; background:var(--border); min-height:0; }
  .pane { background:var(--bg); display:flex; flex-direction:column; min-height:0; }
  .pane > .label { padding:6px 12px; color:var(--dim); font-size:12px; text-transform:uppercase;
           letter-spacing:.6px; background:var(--panel); border-bottom:1px solid var(--border); }
  textarea, pre { font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; }
  #src { flex:1; resize:none; border:0; outline:0; padding:12px; background:var(--bg); color:var(--fg); tab-size:8; }
  .right { display:flex; flex-direction:column; min-height:0; }
  .right > section { display:flex; flex-direction:column; min-height:0; border-bottom:1px solid var(--border); }
  #out { margin:0; padding:10px 12px; flex:1; overflow:auto; white-space:pre-wrap; min-height:80px; }
  #out.err { color:var(--err); }
  #stdin { height:54px; resize:vertical; border:0; outline:0; padding:8px 12px; background:var(--panel2); color:var(--fg); }
  #watWrap { flex:2; min-height:0; }
  #wat { margin:0; padding:10px 12px; overflow:auto; flex:1; color:var(--dim); }
  #diag { padding:6px 12px; color:var(--err); white-space:pre-wrap; font:12px/1.4 ui-monospace,monospace; }
  #about { padding:10px 14px; background:var(--panel); border-top:1px solid var(--border);
           color:var(--dim); font-size:13px; max-height:30vh; overflow:auto; }
  #about b { color:var(--fg); }
  #about code { background:var(--panel2); padding:1px 5px; border-radius:4px; color:var(--accent); }
  .status { font-size:12px; color:var(--dim); }
  .status.ok { color:var(--ok); } .status.bad { color:var(--err); }
</style>
</head>
<body>
<header>
  <h1>Compiler <span class="y">Museum</span></h1>
  <select id="lang" title="language"></select>
  <select id="dialect" title="dialect"></select>
  <select id="example" title="example"></select>
  <button class="run" id="run">Run &#9654;</button>
  <span class="status" id="status"></span>
  <span class="spacer"></span>
  <button id="theme" title="toggle theme">&#9728;</button>
</header>
<main>
  <div class="pane">
    <div class="label">source</div>
    <textarea id="src" spellcheck="false"></textarea>
  </div>
  <div class="pane right">
    <section style="flex:1">
      <div class="label">output</div>
      <pre id="out"></pre>
      <div id="diag"></div>
    </section>
    <section>
      <div class="label">stdin</div>
      <textarea id="stdin" spellcheck="false"></textarea>
    </section>
    <section id="watWrap">
      <div class="label">WebAssembly (WAT)</div>
      <pre id="wat"></pre>
    </section>
  </div>
</main>
<aside id="about"></aside>
<script type="module" src="./app.mjs"></script>
</body>
</html>
